name: Mirror to Gitee

on:
  push:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - run: |
          git remote add gitee https://rogerlzx:${{ secrets.GITEE_TOKEN }}@gitee.com/rogerlzx/hermes-agent.git
          git push gitee HEAD:refs/heads/main --force
